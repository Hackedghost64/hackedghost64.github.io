<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeVerse - Discover Premium Anime Content</title>
  </head>
  <body>
    <div id="root">
      <div class="flex h-screen w-full bg-bg text-white overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-sidebar border-r border-border p-8 flex flex-col gap-10 hidden lg:flex shrink-0">
          <div id="logo-container" class="flex items-center gap-3 cursor-pointer group">
            <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/40 group-hover:scale-110 transition-transform duration-300">
               <span class="text-white text-lg font-black leading-none">A</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase whitespace-nowrap bg-gradient-to-r from-white to-white/40 bg-clip-text text-transparent">AnimeVerse</h1>
          </div>
          
          <nav class="flex flex-col gap-2">
            <div id="nav-home" class="nav-item px-4 py-2 bg-surface rounded-xl text-white font-medium text-sm cursor-pointer active">Home</div>
            <div id="nav-discover" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Discover</div>
            <div id="nav-library" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Library</div>
            <div id="nav-trending" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Trending</div>
          </nav>

          <nav class="flex flex-col gap-2">
            <div class="pl-4 text-[11px] uppercase tracking-widest text-text-dim mb-2 font-bold">Playlists</div>
            <div id="nav-watching" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Watching Now</div>
            <div id="nav-favorites" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Favorites</div>
            <div id="nav-history" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">History</div>
          </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
          <!-- Header -->
          <header class="h-20 px-4 md:px-8 flex items-center justify-between shrink-0 gap-4">
            <div class="relative flex-1 max-w-xs md:max-w-md">
              <input 
                type="text" 
                id="search-input" 
                placeholder="Search anime..." 
                class="w-full bg-surface border border-border rounded-xl px-4 py-2.5 outline-none focus:border-accent transition-all text-sm text-white"
              />
              <div id="search-results-mini" class="absolute top-full left-0 w-full mt-2 bg-surface border border-border rounded-xl shadow-2xl overflow-hidden hidden max-h-[400px] overflow-y-auto z-50"></div>
            </div>

            <div class="flex items-center gap-6">
              <button id="mode-toggle" class="text-xs font-bold uppercase tracking-widest text-text-dim hover:text-white transition-colors">
                SUB
              </button>
              <div class="w-8 h-8 rounded-full bg-surface border border-border flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-dim"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="w-8 h-8 rounded-full bg-accent"></div>
            </div>
          </header>

          <!-- Content Scroll Area -->
          <div id="main-content" class="flex-1 overflow-y-auto p-8 pt-0">
            <!-- Hero Section -->
            <section id="hero-section" class="mb-10">
               <div class="h-72 rounded-3xl relative overflow-hidden flex items-end p-10 hero-gradient">
                  <div id="hero-bg" class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                  <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover -z-10 opacity-40 mix-blend-overlay" />
                  <div class="absolute top-6 left-6 glass px-3 py-1.5 rounded-lg text-xs font-bold border border-white/10 uppercase tracking-widest">Featured Release</div>
                  <div class="relative z-10 max-w-xl">
                    <div id="hero-genres" class="flex gap-4 text-xs text-white/70 mb-3 font-medium">
                      <span>Action</span>
                      <span>•</span>
                      <span>Fantasy</span>
                      <span>•</span>
                      <span>Adventure</span>
                    </div>
                    <h2 id="hero-title" class="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">Discover Premium Anime Content</h2>
                    <p id="hero-description" class="text-white/60 text-sm mb-6 line-clamp-3 max-w-lg font-medium"></p>
                    <div class="flex items-center gap-4">
                       <button id="hero-play" class="bg-accent text-white px-8 py-3 rounded-xl font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-accent/20">Watch Latest Episode</button>
                    </div>
                  </div>
               </div>
            </section>

            <!-- Grid View -->
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-lg font-bold">Recent Updates</h2>
              <span class="text-xs font-bold text-accent cursor-pointer hover:underline uppercase tracking-wide">View All</span>
            </div>
            <div id="content-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
          </div>
          
          <!-- Player Overlay -->
          <div id="player-overlay" class="fixed inset-0 z-[100] bg-bg hidden flex-col">
              <div class="h-16 flex items-center justify-between px-6 border-b border-border bg-sidebar">
                 <div class="flex items-center gap-4">
                    <button id="close-player" class="p-2 hover:bg-surface rounded-lg transition-all text-text-dim hover:text-white">
                       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <h3 id="player-title" class="font-bold truncate max-w-[200px] md:max-w-md text-sm">Watching...</h3>
                 </div>
                 <div id="quality-selector" class="flex gap-2"></div>
              </div>

              <div class="flex-1 flex flex-col md:flex-row h-full overflow-hidden">
                 <div id="video-container" class="flex-[3] bg-black relative flex items-center justify-center">
                    <!-- Video/Iframe will be injected here -->
                 </div>
                 <div id="episodes-sidebar" class="flex-1 bg-sidebar border-l border-border flex flex-col h-full">
                    <div class="p-5 border-b border-border flex justify-between items-center">
                       <span class="font-bold text-[11px] uppercase tracking-[0.2em] text-text-dim">Episodes</span>
                       <span id="current-ep-count" class="text-[11px] font-bold text-accent">0 ITEMS</span>
                    </div>
                    <div id="episodes-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
                 </div>
              </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
