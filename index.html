<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AnimeVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { bg: '#050505', sidebar: '#08080a', accent: '#8b5cf6', surface: '#111113', border: '#1f1f23', 'text-dim': '#71717a' },
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
          }
        }
      }
    </script>
  </head>
  <body class="bg-black text-white selection:bg-accent/30 overflow-x-hidden touch-none">
    <!-- Base Layout Container -->
    <div id="app-container" class="fixed inset-0 flex flex-col overflow-hidden bg-bg">
        <!-- JS will inject either #desktop-view or #mobile-view here -->
    </div>

    <!-- Splash/Intro remains for cinematic start -->
    <div id="splash-screen" class="fixed inset-0 z-[1000] flex pointer-events-none">
       <div id="splash-left" class="flex-1 bg-sidebar border-r border-white/5 pointer-events-auto"></div>
       <div id="splash-right" class="flex-1 bg-sidebar border-l border-white/5 pointer-events-auto"></div>
       <div id="splash-logo" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-6 z-[1001] pointer-events-auto">
          <img src="logo.png" class="w-24 h-24 object-contain drop-shadow-[0_0_30px_rgba(139,92,246,0.6)]" id="splash-img" />
       </div>
    </div>

    <!-- Universal Player (always available) -->
    <div id="player-overlay" class="fixed inset-0 z-[2000] bg-bg hidden flex-col h-screen max-h-full overflow-hidden">
        <div class="h-14 flex items-center justify-between px-4 border-b border-border bg-sidebar shrink-0">
            <button id="close-player" class="p-2 text-text-dim hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
            <h3 id="player-title" class="font-black text-[10px] uppercase tracking-widest truncate max-w-[200px]">Watching</h3>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden min-h-0">
            <div id="video-container" class="w-full aspect-video lg:aspect-auto lg:flex-[3] bg-black relative flex items-center justify-center"></div>
            <div id="episodes-sidebar" class="flex-1 bg-sidebar border-t lg:border-t-0 lg:border-l border-border flex flex-col overflow-hidden min-h-0">
                <div id="episodes-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
