<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeVerse - Discover Premium Anime Content</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#09090b',
              sidebar: '#0c0c0e',
              accent: '#8b5cf6',
              surface: '#18181b',
              border: '#27272a',
              'text-dim': '#a1a1aa',
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            screens: {
                'xs': '480px',
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="flex h-screen w-full bg-bg text-white overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-sidebar border-r border-border p-8 flex flex-col gap-10 hidden lg:flex shrink-0">
          <div id="logo-container" class="flex items-center gap-3 cursor-pointer group">
            <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/40 group-hover:scale-110 transition-transform duration-300">
               <span class="text-white text-lg font-black leading-none">A</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase whitespace-nowrap bg-gradient-to-r from-white to-white/40 bg-clip-text text-transparent">AnimeVerse</h1>
          </div>
          
          <nav class="flex flex-col gap-2">
            <div id="nav-home" class="nav-item px-4 py-2 bg-surface rounded-xl text-white font-medium text-sm cursor-pointer active">Home</div>
            <div id="nav-discover" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Discover</div>
            <div id="nav-library" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Library</div>
            <div id="nav-trending" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Trending</div>
          </nav>

          <nav class="flex flex-col gap-2">
            <div class="pl-4 text-[11px] uppercase tracking-widest text-text-dim mb-2 font-bold">Playlists</div>
            <div id="nav-watching" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Watching Now</div>
            <div id="nav-favorites" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">Favorites</div>
            <div id="nav-history" class="nav-item px-4 py-2 hover:bg-surface/50 rounded-xl text-text-dim hover:text-white font-medium text-sm cursor-pointer transition-all">History</div>
          </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
          <!-- Header -->
          <header class="h-16 md:h-20 px-4 md:px-8 flex items-center justify-between shrink-0 gap-3 md:gap-4">
            <div class="lg:hidden w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/40 shrink-0">
               <span class="text-white text-base font-black leading-none">A</span>
            </div>
            
            <div class="relative flex-1 max-w-xs md:max-w-md">
              <input 
                type="text" 
                id="search-input" 
                placeholder="Search anime..." 
                class="w-full bg-surface border border-border rounded-xl px-4 py-2.5 outline-none focus:border-accent transition-all text-xs md:text-sm text-white"
              />
              <div id="search-results-mini" class="fixed md:absolute top-20 md:top-full left-4 md:left-0 right-4 md:right-0 mt-2 bg-surface border border-border rounded-xl shadow-2xl overflow-hidden hidden max-h-[60vh] md:max-h-[400px] overflow-y-auto z-50"></div>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
              <button id="mode-toggle" class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-text-dim hover:text-white transition-colors">
                SUB
              </button>
              <div class="hidden xs:flex items-center gap-3 md:gap-6">
                <div class="w-8 h-8 rounded-full bg-surface border border-border flex items-center justify-center cursor-help" title="Press ? for shortcuts">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-dim"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="w-8 h-8 rounded-full bg-accent"></div>
              </div>
            </div>
          </header>

          <!-- Content Scroll Area -->
          <div id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8 pt-0 pb-24 md:pb-8">
            <!-- Hero Section -->
            <section id="hero-section" class="mb-6 md:mb-10">
               <div class="h-64 md:h-72 rounded-2xl md:rounded-3xl relative overflow-hidden flex items-end p-6 md:p-10 hero-gradient">
                  <div id="hero-bg" class="absolute inset-0 bg-gradient-to-t from-black/80 md:from-black/60 to-transparent"></div>
                  <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover -z-10 opacity-40 mix-blend-overlay" />
                  <div class="absolute top-4 left-4 md:top-6 md:left-6 glass px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold border border-white/10 uppercase tracking-widest">Featured</div>
                  <div class="relative z-10 max-w-xl">
                    <div id="hero-genres" class="flex flex-wrap gap-2 md:gap-4 text-[10px] md:text-xs text-white/70 mb-2 md:mb-3 font-medium">
                      <span>Action</span>
                      <span>•</span>
                      <span>Fantasy</span>
                    </div>
                    <h2 id="hero-title" class="text-2xl md:text-5xl font-extrabold mb-3 md:mb-4 leading-tight line-clamp-2">Discover Premium Anime Content</h2>
                    <p id="hero-description" class="text-white/60 text-xs md:text-sm mb-4 md:mb-6 line-clamp-2 md:line-clamp-3 max-w-lg font-medium hidden xs:block"></p>
                    <div class="flex items-center gap-4">
                       <button id="hero-play" class="bg-accent text-white px-6 py-2.5 md:px-8 md:py-3 rounded-xl font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-accent/20 text-sm md:text-base">Watch Now</button>
                    </div>
                  </div>
               </div>
            </section>

            <!-- Grid View -->
            <div class="flex items-center justify-between mb-4 md:mb-6">
              <h2 class="text-base md:text-lg font-bold">Recent Updates</h2>
              <span class="text-[10px] md:text-xs font-bold text-accent cursor-pointer hover:underline uppercase tracking-wide">View All</span>
            </div>
            <div id="content-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-5"></div>
          </div>

          <!-- Bottom Navigation (Mobile Only) -->
          <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-sidebar/80 backdrop-blur-xl border-t border-border px-6 py-3 flex justify-between items-center z-[90]">
            <button id="mobile-nav-home" class="mobile-nav-item active">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </button>
            <button id="mobile-nav-discover" class="mobile-nav-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
              <span class="text-[10px] font-bold uppercase tracking-tighter">Explore</span>
            </button>
            <button id="mobile-nav-library" class="mobile-nav-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
              <span class="text-[10px] font-bold uppercase tracking-tighter">Library</span>
            </button>
            <button id="mobile-nav-history" class="mobile-nav-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span class="text-[10px] font-bold uppercase tracking-tighter">History</span>
            </button>
          </nav>
          
          <!-- Player Overlay -->
          <div id="player-overlay" class="fixed inset-0 z-[100] bg-bg hidden flex-col h-screen max-h-full overflow-hidden">
              <div class="h-14 md:h-16 flex items-center justify-between px-4 md:px-6 border-b border-border bg-sidebar shrink-0">
                 <div class="flex items-center gap-2 md:gap-4 overflow-hidden">
                    <button id="close-player" class="p-2 hover:bg-surface rounded-lg transition-all text-text-dim hover:text-white shrink-0">
                       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <h3 id="player-title" class="font-bold truncate text-xs md:text-sm">Watching...</h3>
                 </div>
              </div>

              <div class="flex-1 flex flex-col lg:flex-row overflow-hidden min-h-0">
                 <div id="video-container" class="w-full aspect-video lg:aspect-auto lg:flex-[3] bg-black relative flex items-center justify-center shrink-0 lg:shrink">
                    <!-- Video/Iframe will be injected here -->
                 </div>
                 <div id="episodes-sidebar" class="flex-1 bg-sidebar border-t lg:border-t-0 lg:border-l border-border flex flex-col overflow-hidden min-h-0">
                    <div class="p-4 md:p-5 border-b border-border flex justify-between items-center shrink-0">
                       <span class="font-bold text-[10px] md:text-[11px] uppercase tracking-[0.2em] text-text-dim">Episodes</span>
                       <span id="current-ep-count" class="text-[10px] md:text-[11px] font-bold text-accent">0 ITEMS</span>
                    </div>
                    <div id="episodes-list" class="flex-1 overflow-y-auto p-3 md:p-4 pb-24 md:pb-8 space-y-2"></div>
                 </div>
              </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
